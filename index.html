<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>ページを開いてからの経過時間</h1>
    <p class = "showtime">aaa</p>
</body>
<style>
    .showtime{
        position: absolute;
        top: 100px;
        font-size: 50px;
    }
</style>
<script>
    const t0 = Date.now()/1000;
    const obj = document.querySelector(".showtime");
    function update(){
        t = Date.now()/1000;
        obj.textContent =Math.round(t-t0);
        requestAnimationFrame(update)
    }
    update();
</script>
</html>
