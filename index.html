<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単振動</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: white;
}

.circle {
    width: 100px;
    height: 100px;
    background: red;
    border-radius: 50%;
    position: absolute;
}
</style>
</head>

<body>

<div class="circle" id="circle"></div>

<script>
const circle = document.getElementById("circle");

function animate(time) {

    const t = time / 1000; // 秒

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const A = 150;
    const omega = 2;

    const y = centerY + A * Math.sin(omega * t);

    circle.style.left = (centerX - 50) + "px";
    circle.style.top = (y - 50) + "px";

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

</body>
</html>
