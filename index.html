<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単振動</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: white;
}

.circle {
    width: 100px;
    height: 100px;
    background: red;
    border-radius: 50%;
    position: absolute;
}
</style>
</head>

<body>

<div class="circle" id="circle"></div>

<script>
const circle = document.getElementById("circle");

let t = 0;

function animate() {
    t += 0.03;

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const amplitude = 150; // 振幅

    const y = centerY + amplitude * Math.sin(t);

    circle.style.left = (centerX - 50) + "px";
    circle.style.top = (y - 50) + "px";

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
