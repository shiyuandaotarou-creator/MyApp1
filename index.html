<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="rectangle" id="rightup"></div>
    <div class="rectangle" id="rightdown"></div>
    <div class="rectangle" id="leftup"></div>
    <div class="rectangle" id="leftdown"></div>
</body>
<style>
    .rectangle {
        position: absolute;
        height: 10vw;
        width: 10vw;
    }

    #rightup {
        top: 10px;
        right: 10px;
        background-color: red;
    }

    #rightdown {
        bottom: 10px;
        right: 10px;
        background-color: blue;
    }

    #leftup {
        top: 10px;
        left: 10px;
        background-color: yellow;
    }

    #leftdown {
        bottom: 10px;
        left: 10px;
        background-color: green;
    }
</style>

</html>
