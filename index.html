<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加速度計</title>

<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 48px;
    font-family: sans-serif;
}

#acc {
    text-align: center;
}
</style>
</head>

<body>

<div id="acc">
    読み込み中...
</div>

<script>
const acc = document.getElementById("acc");

function startSensor() {

    window.addEventListener("devicemotion", (event) => {

        const g = event.accelerationIncludingGravity;

        if (!g) return;

        const x = g.x ?? 0;
        const y = g.y ?? 0;
        const z = g.z ?? 0;

        // 重力ベクトルの大きさ
        const norm = Math.sqrt(x*x + y*y + z*z);

        // 鉛直方向からの傾き
        const theta = Math.acos(z / norm) * 180 / Math.PI;

        acc.innerHTML = `
            x = ${x.toFixed(2)} m/s²<br>
            y = ${y.toFixed(2)} m/s²<br>
            z = ${z.toFixed(2)} m/s²<br><br>

            |g| = ${norm.toFixed(2)} m/s²<br><br>

            傾き角 = ${theta.toFixed(1)}°
        `;
    });
}

if (
    typeof DeviceMotionEvent !== "undefined" &&
    typeof DeviceMotionEvent.requestPermission === "function"
) {
    acc.innerHTML = "タップして開始";

    document.body.onclick = async () => {
        const result =
            await DeviceMotionEvent.requestPermission();

        if (result === "granted") {
            startSensor();
        }
    };
}
else {
    startSensor();
}
</script>

</body>
</html>
