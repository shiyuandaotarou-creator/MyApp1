<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加速度計</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: white;
}

#ball {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: red;
    position: absolute;
}
</style>
``
</head>

<body>

<div id="ball"></div>

<script>

const ball = document.getElementById("ball");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

function updateBall() {
    ball.style.left = (x - 25) + "px";
    ball.style.top = (y - 25) + "px";
}

updateBall();

function startSensor() {

    window.addEventListener("devicemotion", (event) => {

        const g = event.accelerationIncludingGravity;

        if (!g) return;

        // 横方向
        x += g.x * 2;

        // 縦方向
        y += -g.y * 2;

        const radius = 25;

        // 左右の壁
        x = Math.max(radius,
            Math.min(window.innerWidth - radius, x));

        // 上下の壁
        y = Math.max(radius,
            Math.min(window.innerHeight - radius, y));

        updateBall();
    });
}

if (
    typeof DeviceMotionEvent !== "undefined" &&
    typeof DeviceMotionEvent.requestPermission === "function"
) {
    document.body.innerHTML +=
        '<div id="msg" style="position:absolute;top:20px;left:20px;">タップして開始</div>';

    document.body.onclick = async () => {

        const result =
            await DeviceMotionEvent.requestPermission();

        if (result === "granted") {
            document.getElementById("msg").remove();
            startSensor();
        }
    };
}
else {
    startSensor();
}

</script>

</body>
</html>
